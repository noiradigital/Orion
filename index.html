<title>Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --dark:#3A3530;--dark2:#47423D;--paper:#F1EFEC;--bg2:#E6E2DC;--card:#FAF8F5;
  --line:#D2CCC4;--line2:#BCB3A8;--accent:#A49485;--deep:#7F6F60;
  --ink:#2E2823;--cream:#EDE8DF;--glow:rgba(237,232,223,.5);
  --sage:#7E9A78;--amber:#C39A55;--terra:#BE7A63;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--dark);overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
body{font-family:'Montserrat',sans-serif;background:var(--dark);color:var(--cream);-webkit-font-smoothing:antialiased;overscroll-behavior:none;overflow-x:hidden;touch-action:pan-y;font-size:13.5px;line-height:1.6;}
input,textarea,select,button{font-family:inherit;}
input::placeholder,textarea::placeholder{color:#B9B1A7;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
@keyframes pIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
@keyframes glowP{0%,100%{text-shadow:0 0 22px rgba(237,232,223,.45),0 0 60px rgba(237,232,223,.16);}50%{text-shadow:0 0 34px rgba(237,232,223,.7),0 0 90px rgba(237,232,223,.26);}}
@keyframes pop{0%{transform:scale(.5);opacity:0;}65%{transform:scale(1.14);}100%{transform:scale(1);opacity:1;}}
@keyframes hcard-press{0%{transform:scale(1);}50%{transform:scale(.96);}100%{transform:scale(1);}}
@keyframes sheen{0%{transform:translateX(-130%) skewX(-18deg);}100%{transform:translateX(230%) skewX(-18deg);}}
/* carte avec reflet au hover */
.hcard{background:var(--dark2);border:1px solid rgba(237,232,223,.13);border-radius:16px;padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;transition:opacity .15s;}
.hcard::before{content:'';position:absolute;top:0;left:0;width:60%;height:100%;background:linear-gradient(108deg,transparent 15%,rgba(220,215,205,.07) 50%,transparent 85%);transform:translateX(-130%) skewX(-18deg);pointer-events:none;}
.hcard:hover::before{animation:sheen .5s ease forwards;}
.hcard:active{animation:hcard-press .22s ease both;}
/* carte sans reflet (défi + progression) */
.hcard-s{border-radius:18px;cursor:pointer;position:relative;overflow:hidden;transition:opacity .15s;}
.hcard-s:active{animation:hcard-press .22s ease both;}
@keyframes sheetIn{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}
.frame{display:flex;justify-content:center;min-height:100vh;}
.col{position:relative;width:100%;max-width:462px;min-height:100vh;background:var(--dark);box-shadow:0 0 90px rgba(0,0,0,.45);overflow-x:hidden;}
/* ── screens ── */
.screen{display:none;position:fixed;inset:0;max-width:462px;margin:0 auto;z-index:60;}
.screen.on{display:flex;flex-direction:column;align-items:center;justify-content:center;}
/* ── auth ── */
#s-auth{background:var(--dark);padding:0;text-align:center;position:relative;overflow:hidden;}
#auth-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.auth-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 30px;}
.logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:66px;line-height:1;color:var(--cream);animation:glowP 6s ease-in-out infinite;}
.eyebrow{font-size:9px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);}
.auth-lbl{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;text-align:left;width:100%;max-width:320px;}
.auth-inp{width:100%;max-width:320px;background:rgba(237,232,223,.07);border:1px solid rgba(237,232,223,.16);border-radius:11px;padding:15px 16px;font-size:15px;font-weight:500;color:var(--cream);outline:none;text-align:center;letter-spacing:.12em;margin-bottom:14px;}
.auth-inp:focus{border-color:rgba(237,232,223,.4);}
.auth-err{font-size:11px;color:#C98B7B;margin-bottom:12px;display:none;}
.auth-err.on{display:block;}
.btn-cream{width:100%;max-width:320px;background:var(--cream);color:var(--dark);border:none;border-radius:11px;padding:15px;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.btn-cream:hover{opacity:.88;}
/* ── onboarding ── */
#s-onb{background:var(--dark);padding:40px 30px;overflow-y:auto;}
.ob-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:44px;color:var(--cream);text-shadow:0 0 20px var(--glow);margin-bottom:6px;}
.ob-title{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:28px;}
.dots{display:flex;gap:7px;margin-bottom:32px;}
.dot{width:26px;height:3px;border-radius:99px;background:rgba(237,232,223,.18);transition:background .3s;}
.dot.on{background:var(--cream);}
.ob-step{display:none;width:100%;max-width:400px;animation:pIn .4s ease;}
.ob-step.on{display:block;}
.ob-q{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;color:var(--cream);margin-bottom:6px;}
.ob-hint{font-size:10px;color:var(--accent);margin-bottom:22px;}
.ob-inp{width:100%;background:rgba(237,232,223,.07);border:1px solid rgba(237,232,223,.16);border-radius:11px;padding:15px 16px;font-size:15px;font-weight:500;color:var(--cream);outline:none;margin-bottom:20px;}
.ob-choices{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.ob-choice{background:rgba(237,232,223,.05);border:1px solid rgba(237,232,223,.12);border-radius:11px;padding:14px 15px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px;}
.ob-choice:hover,.ob-choice.on{border-color:var(--cream);background:rgba(237,232,223,.12);}
.ob-ch-icon{font-size:21px;flex-shrink:0;}
.ob-ch-lbl{font-size:12px;font-weight:700;color:var(--cream);letter-spacing:.03em;display:block;margin-bottom:2px;}
.ob-ch-desc{font-size:10px;color:var(--accent);line-height:1.5;}
.ob-next{width:100%;background:var(--cream);color:var(--dark);border:none;border-radius:11px;padding:15px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;opacity:1;transition:opacity .2s;}
.ob-next:disabled{opacity:.35;cursor:default;}
/* ── app ── */
#app{display:none;padding-bottom:0;}
#app.on{display:block;}
/* floating hamburger — replaces top bar */
.top-bar{display:none;}
.top-bar-title{display:none;}
#top-bar-left{display:none;}
.hamburger-float{position:fixed;top:calc(14px + var(--safe-top));left:16px;z-index:55;background:rgba(58,53,48,.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(237,232,223,.12);border-radius:10px;padding:9px 10px;cursor:pointer;display:flex;flex-direction:column;gap:4px;transition:opacity .15s;}
.hamburger-float:hover{opacity:.8;}
.hamburger-float span{display:block;width:20px;height:1.5px;background:var(--cream);border-radius:2px;}
/* side drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:80;display:none;max-width:462px;margin:0 auto;}
.drawer-overlay.on{display:block;}
.drawer{position:absolute;top:0;left:0;bottom:0;width:75%;max-width:300px;background:var(--dark);padding:0;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
.drawer.on{transform:translateX(0);}
.drawer-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);}
.drawer-inner{position:relative;z-index:2;padding:20px 0;padding-top:calc(20px + var(--safe-top));}
.drawer-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:36px;color:var(--cream);padding:0 24px 24px;border-bottom:1px solid rgba(237,232,223,.08);}
.drawer-sub{font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);display:block;margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:14px;padding:15px 24px;cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover,.nav-item.on{background:rgba(237,232,223,.06);}
.nav-item.on .nav-lbl{color:var(--cream);}
.nav-icon{width:36px;height:36px;border-radius:10px;background:rgba(237,232,223,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-lbl{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.02em;transition:color .15s;}
.nav-item.on .nav-icon svg{stroke:var(--cream);}
/* pages */
.page{display:none;animation:pIn .3s ease;background:var(--dark);}
.page.on{display:block;}
.body{max-width:680px;margin:0 auto;padding:20px 18px 40px;}
/* contenu sticky tabs */
.contenu-sticky{position:sticky;top:0;z-index:40;background:var(--dark);padding:calc(60px + var(--safe-top)) 18px 10px;border-bottom:1px solid rgba(237,232,223,.08);}
/* sub-page title in body */
.sub-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:32px;color:var(--cream);line-height:1;margin-bottom:4px;}
.sub-title-sm{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;}
/* non-home pages: room for floating hamburger */
#p-today .body,#p-prospects .body,#p-contenu .body,#p-plus .body{padding-top:calc(60px + var(--safe-top));}
/* cards */
.card{background:var(--dark2);border:1px solid rgba(237,232,223,.1);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-dk{background:rgba(58,53,48,.6);border:1px solid rgba(237,232,223,.08);border-radius:14px;padding:18px 16px;margin-bottom:12px;}
/* section label */
.sec{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;margin-top:6px;}
/* action buttons */
.btn-dark{display:block;width:100%;background:var(--dark2);color:var(--cream);border:1px solid rgba(237,232,223,.18);border-radius:11px;padding:14px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;margin-bottom:10px;transition:opacity .2s;text-align:center;}
.btn-dark:hover{opacity:.82;}
.btn-ghost{display:flex;align-items:center;gap:10px;background:var(--dark2);border:1px solid rgba(237,232,223,.12);border-radius:11px;padding:14px 15px;font-size:12.5px;font-weight:600;color:var(--cream);cursor:pointer;transition:border-color .2s;margin-bottom:10px;width:100%;}
.btn-ghost:hover{border-color:var(--accent);}
/* stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-box{background:var(--dark2);border:1px solid rgba(237,232,223,.1);border-radius:12px;padding:14px;}
.stat-val{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:30px;color:var(--cream);line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);}
/* tag */
.tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:99px;}
/* checklist items */
.chk-row{display:flex;align-items:center;gap:12px;background:var(--dark2);border:1px solid rgba(237,232,223,.1);border-radius:11px;padding:13px 14px;margin-bottom:8px;cursor:pointer;transition:opacity .2s;}
.chk-box{width:20px;height:20px;border-radius:6px;border:1.5px solid rgba(237,232,223,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.chk-row.done .chk-box{background:var(--accent);border-color:var(--accent);}
.chk-row.done .chk-txt{text-decoration:line-through;color:var(--accent);}
/* modals */
.overlay{position:fixed;inset:0;max-width:462px;margin:0 auto;background:rgba(23,21,19,.86);z-index:70;display:none;align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.sheet{background:var(--dark2);border-radius:20px 20px 0 0;padding:24px 20px 30px;width:100%;max-height:90vh;overflow-y:auto;animation:sheetIn .3s ease;}
.sheet-handle{width:38px;height:4px;background:rgba(237,232,223,.15);border-radius:99px;margin:0 auto 20px;}
.sheet-ttl{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;color:var(--cream);margin-bottom:20px;}
.form-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:6px;}
.form-inp:focus,.form-sel:focus,.form-ta:focus{border-color:rgba(237,232,223,.4);}
/* fix: override the duplicate focus rule */
.form-inp,.form-sel,.form-ta{width:100%;background:rgba(237,232,223,.07);border:1px solid rgba(237,232,223,.14);border-radius:9px;padding:11px 13px;font-size:13px;color:var(--cream);outline:none;transition:border-color .2s;}
.form-inp:focus,.form-sel:focus,.form-ta:focus{border-color:var(--deep);}
.form-ta{resize:vertical;min-height:80px;}
.form-f{margin-bottom:14px;}
/* toast */
#toast{position:fixed;bottom:108px;left:50%;transform:translate(-50%,0);background:var(--dark);color:var(--cream);font-size:11.5px;font-weight:600;letter-spacing:.04em;padding:11px 20px;border-radius:99px;z-index:80;display:none;animation:toastIn .25s ease;box-shadow:0 8px 30px rgba(0,0,0,.4);}
/* eng chips */
.chip{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:9px 14px;font-size:11.5px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid rgba(237,232,223,.14);background:rgba(237,232,223,.05);color:var(--accent);margin:0 5px 8px 0;}
.chip.on{background:var(--cream);color:var(--dark);border-color:var(--cream);}
/* progress bar */
.prog-bar{height:5px;border-radius:99px;background:rgba(237,232,223,.1);overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}
/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{aspect-ratio:1;border-radius:3px;}
/* filter chips */
.filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;}
.f-chip{flex-shrink:0;border-radius:99px;padding:7px 14px;font-size:10px;font-weight:600;letter-spacing:.04em;cursor:pointer;white-space:nowrap;transition:all .2s;border:1px solid rgba(237,232,223,.14);background:transparent;color:var(--accent);}
.f-chip.on{border-color:var(--cream);background:var(--cream);color:var(--dark);}
/* pack card */
.pack-card{background:var(--dark);border:1px solid rgba(237,232,223,.1);border-radius:14px;padding:16px 14px;cursor:pointer;min-height:118px;display:flex;flex-direction:column;}
/* mini btn */
.mini-btn{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 10px;border-radius:7px;border:1px solid rgba(237,232,223,.1);background:transparent;color:var(--deep);cursor:pointer;transition:all .15s;}
.mini-btn:hover{border-color:var(--accent);color:var(--accent);}
.mini-btn.danger:hover{border-color:var(--terra);color:var(--terra);}
/* week nav */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.week-btn{width:36px;height:36px;border-radius:99px;border:1px solid rgba(237,232,223,.1);background:var(--dark2);color:var(--cream);font-size:16px;cursor:pointer;}
.week-lbl{font-size:11px;font-weight:600;color:var(--deep);}
/* metric input */
.met-card{background:var(--dark2);border:1px solid rgba(237,232,223,.1);border-radius:12px;padding:13px 14px;}
.met-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
.met-inp{width:100%;border:none;background:transparent;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:30px;color:var(--cream);outline:none;}
/* hub item */
.hub-item{display:flex;align-items:center;gap:13px;background:var(--dark2);border:1px solid rgba(237,232,223,.1);border-radius:13px;padding:16px;cursor:pointer;margin-bottom:10px;}
.hub-lbl{font-size:13px;font-weight:600;color:var(--cream);}
.hub-desc{font-size:10px;color:var(--accent);}
/* victory card */
.vic-photo{width:100%;height:160px;background-size:cover;background-position:center;display:block;}
/* back btn */
.back-btn{color:var(--cream);cursor:pointer;line-height:1;background:none;border:none;padding:4px;display:flex;align-items:center;transition:opacity .15s;}
.back-btn:hover{opacity:.7;}
@media(min-width:600px){.stat-grid{grid-template-columns:repeat(4,1fr);}}
</style>

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayOfYear(){const n=new Date();return Math.floor((n-new Date(n.getFullYear(),0,0))/86400000);}
function weekKey(date){const d=new Date(date);d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekLabel(date){const d=new Date(date);d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));const e=new Date(d);e.setDate(d.getDate()+6);const f=dt=>dt.getDate()+'/'+(dt.getMonth()+1);return 'Semaine du '+f(d)+' au '+f(e);}
function fmtDate(ts){const d=new Date(ts);const m=['jan','fév','mar','avr','mai','jun','jul','août','sep','oct','nov','déc'];return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();}
function fmtShort(ts){const d=new Date(ts);return d.getDate()+'/'+(d.getMonth()+1);}
function dayCount(dk){const pc=S.planChecks[dk]||{};const ec=S.engChecks[dk]||{};return Object.values(pc).filter(Boolean).length+Object.values(ec).filter(Boolean).length+(S.defiDates.includes(dk)?1:0);}

function toast(msg){const el=$('toast');el.textContent=msg;el.style.display='block';clearTimeout(toastTm);toastTm=setTimeout(()=>el.style.display='none',1700);}

function saveProspect(){
  const name=($('pm-name').value||'').trim();if(!name)return;

let SUB_PAGE='';

const SUB_LABELS={stats:'Stats',ventes:'Mes ventes',victoires:'Victoires',reg:'Régularité',ressources:'Ressources',params:'Paramètres'};
function goSub(s,origin){
  SUB_PAGE=s;
  if(origin)SUB_ORIGIN=origin;
  const hf=$('hamburger-float');
  const bf=$('back-float');
  if(s){
    const backFn=SUB_ORIGIN==='home'?()=>goTab('home'):()=>goSub('');
    if(hf)hf.style.display='none';
    if(bf){bf.style.display='flex';bf.onclick=backFn;}
  } else {
    SUB_ORIGIN='plus';
    if(hf)hf.style.display='flex';
    if(bf)bf.style.display='none';
  }
  window.scrollTo(0,0);
  renderPlus();
}

function renderPlus(){
  const body=$('plus-body');
  if(!SUB_PAGE){
    body.innerHTML=`
      <div class="sub-title">Plus.</div>

      ${hubItem('💰','Mes ventes','Clients · Montants · Graphique',"goSub('ventes')")}

      ${hubItem('📅','Régularité','Ta discipline jour après jour',"goSub('reg')")}
      ${hubItem('📁','Ressources','Drive, Canva, templates…',"goSub('ressources')")}
      ${hubItem('⚙️','Paramètres','Prénom, offre, chemin de vente',"goSub('params')")}`;

  const st=subTitles[SUB_PAGE]||{t:SUB_LABELS[SUB_PAGE]||'',s:''};

function renderVentes(body){
  const ventes=[...S.ventes].sort((a,b)=>a.date>b.date?-1:1);
  const total=S.ventes.reduce((s,v)=>s+(+v.montant||0),0);
  const totalFmt=total.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});

  // Graphique cumulatif
  const byMonth={};
  S.ventes.forEach(v=>{
    const m=(v.date||'').slice(0,7);
    if(m)byMonth[m]=(byMonth[m]||0)+(+v.montant||0);
  });
  const months=Object.keys(byMonth).sort();
  let cum=0;const cumData=months.map(m=>{cum+=byMonth[m];return cum;});
  const maxVal=cumData.length?cumData[cumData.length-1]:1;
  const W=320,H=90,pad=10;
  const pts=cumData.map((v,i)=>{
    const x=pad+(i/(Math.max(cumData.length-1,1)))*(W-pad*2);
    const y=H-pad-(v/maxVal)*(H-pad*2);
    return `${x},${y}`;
  }).join(' ');
  const graphHtml=months.length>1?`
    <div style="margin-bottom:18px;background:var(--dark2);border:1px solid rgba(237,232,223,.1);border-radius:14px;padding:16px;">

        <defs><linearGradient id="gv" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity=".25"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
        <polygon points="${pts} ${W-pad},${H-pad} ${pad},${H-pad}" fill="url(#gv)"/>
        <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        ${cumData.map((v,i)=>{const[x,y]=pts.split(' ')[i].split(',');return `<circle cx="${x}" cy="${y}" r="3.5" fill="var(--accent)"/>`;}).join('')}
      </svg>
      <div style="display:flex;justify-content:space-between;margin-top:6px;">
        ${months.map(m=>`<div style="font-size:8px;color:var(--accent);text-align:center;">${m.slice(5)}</div>`).join('')}
      </div>
    </div>`:
    `<div style="background:var(--dark2);border:1px solid rgba(237,232,223,.1);border-radius:14px;padding:16px;text-align:center;color:var(--accent);font-size:12px;margin-bottom:18px;">Ajoute au moins 2 ventes pour voir le graphique.</div>`;

  body.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;">
      <div style="background:var(--dark);border-radius:14px;padding:16px;">
        <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(237,232,223,.45);margin-bottom:6px;">Total CA</div>
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;color:var(--cream);line-height:1;">${totalFmt}</div>
      </div>
      <div style="background:var(--dark);border-radius:14px;padding:16px;">
        <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(237,232,223,.45);margin-bottom:6px;">Ventes</div>
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;color:var(--cream);line-height:1;">${S.ventes.length}</div>
      </div>
    </div>
    ${graphHtml}
    <button class="btn-dark" onclick="openAddVente()" style="margin-bottom:18px;">+ Ajouter une vente</button>
    ${ventes.length?ventes.map((v,i)=>`
      <div style="background:var(--dark2);border:1px solid rgba(237,232,223,.1);border-radius:14px;padding:15px;margin-bottom:10px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:700;color:var(--cream);margin-bottom:3px;">${esc(v.client||'—')}</div>
            <div style="font-size:10px;color:var(--accent);margin-bottom:5px;">${esc(v.produit||'')}</div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-size:9px;font-weight:600;letter-spacing:.06em;background:rgba(71,66,61,.5);border-radius:99px;padding:3px 9px;color:var(--deep);">${fmtDate(v.date)}</span>

            </div>

            <button onclick="delVente(${S.ventes.indexOf(v)})" style="font-size:9px;color:var(--accent);background:none;border:none;cursor:pointer;margin-top:6px;">Supprimer</button>

    <!-- Overlay ajout vente -->

        <div class="form-f"><label class="form-lbl">Montant total (€)</label><input type="number" id="vente-montant" class="form-inp" placeholder="Ex : 1200"></div>

function selectPay(mode){
  window._payMode=mode;
  const c=$('pay-complet'),e=$('pay-echelonne');
  if(c&&e){
    c.style.background=mode==='complet'?'var(--dark)':'transparent';
    c.style.color=mode==='complet'?'var(--cream)':'var(--deep)';
    c.style.borderColor=mode==='complet'?'var(--dark)':'var(--line2)';
    e.style.background=mode==='echelonne'?'var(--dark)':'transparent';
    e.style.color=mode==='echelonne'?'var(--cream)':'var(--deep)';
    e.style.borderColor=mode==='echelonne'?'var(--dark)':'var(--line2)';
  }
}
function openAddVente(){const ov=$('ov-vente');if(ov){ov.style.display='flex';}}

function saveVente(){
  const client=($('vente-client').value||'').trim();

  const montant=+($('vente-montant').value||0);

  S.ventes=[...S.ventes,{client,produit,montant,date,paiement:window._payMode||'complet'}];

}
function delVente(i){if(i<0||i>=S.ventes.length)return;S.ventes.splice(i,1);save();renderPlus();}

function saveMetrics(){

function vicPhotoChange(){

}

function renderParams(body){

/* ════ CAL ════ */
function buildCal(days){
  const out=[];const now=new Date();now.setHours(0,0,0,0);
  const start=new Date(now);start.setDate(now.getDate()-(days-1));
  const pad=(start.getDay()+6)%7;
  for(let i=0;i<pad;i++)out.push({col:'transparent'});
  for(let i=0;i<days;i++){const d=new Date(start);d.setDate(start.getDate()+i);const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const c=dayCount(key);const col=c===0?'#E6E2DC':c<=2?'#C9C0B2':c<=4?'#9C8C72':'#5E5142';out.push({col});}
  return out;
}
function calcStreak(){let s=0;const t=new Date();t.setHours(0,0,0,0);let cur=new Date(t);const todayKey=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');if(dayCount(todayKey)===0)cur.setDate(cur.getDate()-1);for(let i=0;i<400;i++){const key=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');if(dayCount(key)>0){s++;cur.setDate(cur.getDate()-1);}else break;}return s;}

/* ════ INIT ════ */
(function init(){
  if(S.authed){$('s-auth').classList.remove('on');launchApp();}
})();

/* ════ AUTH CANVAS — billes beiges ════ */
(function initAuthCanvas(){
  const canvas=$('auth-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const N=60;
  let W,H,pts,raf;
  function resize(){W=canvas.width=canvas.offsetWidth||360;H=canvas.height=canvas.offsetHeight||window.innerHeight;}
  function mkPt(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.8+.8,vx:(Math.random()-.5)*.3,vy:-(Math.random()*.4+.1),a:Math.random()*.55+.1,da:(Math.random()-.5)*.006,wobble:Math.random()*Math.PI*2,wSpeed:Math.random()*.015+.004};}
  function setup(){resize();pts=Array.from({length:N},mkPt);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    // soft warm glow centre
    const g=ctx.createRadialGradient(W*.5,H*.42,0,W*.5,H*.42,W*.6);
    g.addColorStop(0,'rgba(195,154,85,.08)');g.addColorStop(1,'rgba(58,53,48,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    // dots
    pts.forEach(p=>{
      p.wobble+=p.wSpeed;p.x+=p.vx+Math.sin(p.wobble)*.25;p.y+=p.vy;p.a+=p.da;
      if(p.a<.06)p.da=Math.abs(p.da);if(p.a>.6)p.da=-Math.abs(p.da);
      if(p.y<-10||p.x<-10||p.x>W+10){Object.assign(p,mkPt());p.y=H+5;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,213,200,${p.a})`;ctx.fill();
    });
    raf=requestAnimationFrame(draw);
  }
  setup();draw();
  window.addEventListener('resize',()=>{cancelAnimationFrame(raf);resize();draw();});
})();

/* ════ HOME CANVAS — particules vivantes ════ */
(function initCanvas(){
  const canvas=$('home-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const N=60;
  let W,H,pts,raf;
  function resize(){
    const p=$('p-home');
    W=canvas.width=p.offsetWidth||360;
    H=canvas.height=Math.max(p.scrollHeight,window.innerHeight*1.5);
  }
  function mkPt(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.8+.8,vx:(Math.random()-.5)*.3,vy:-(Math.random()*.4+.1),a:Math.random()*.55+.1,da:(Math.random()-.5)*.006,wobble:Math.random()*Math.PI*2,wSpeed:Math.random()*.015+.004};}
  function setup(){resize();pts=Array.from({length:N},mkPt);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.wobble+=p.wSpeed;p.x+=p.vx+Math.sin(p.wobble)*.25;p.y+=p.vy;p.a+=p.da;
      if(p.a<.06)p.da=Math.abs(p.da);if(p.a>.6)p.da=-Math.abs(p.da);
      if(p.y<-10||p.x<-10||p.x>W+10){Object.assign(p,mkPt());p.y=H+5;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,213,200,${p.a})`;ctx.fill();
    });
    raf=requestAnimationFrame(draw);
  }
  setup();draw();
  const obs=new MutationObserver(()=>{cancelAnimationFrame(raf);resize();draw();});
  obs.observe($('home-body'),{childList:true});
  window.addEventListener('resize',()=>{cancelAnimationFrame(raf);resize();draw();});
})();
</script>
